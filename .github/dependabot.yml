# Dependabot configuration for OrbFrontend/Orb
#
# Enables automated dependency PRs. Once this is on `main`, Dependabot will:
#   1. Open PRs to fix the 14 known vulnerabilities (security updates), and
#   2. Keep dependencies current on a weekly cadence (version updates).
#
# NOTE: Security updates are driven by Dependabot *alerts* (already enabled
# on your repo) and don't strictly require this file — but adding the
# package-ecosystem entries below is what turns on the routine *version*
# updates and lets you control grouping, cadence, and scope.

version: 2

updates:
  # --- Python: root requirements.txt + requirements-dev.txt ---
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    # Group routine version bumps into a few PRs instead of one-per-package,
    # so your PR list stays readable. Security fixes are still opened
    # individually and promptly regardless of grouping.
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # --- Python: backend/ (only needed if backend has its own manifest) ---
  # Remove this block if backend/ has no separate requirements*.txt /
  # pyproject.toml. Dependabot will error on a directory with no manifest.
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
      - "backend"
    groups:
      backend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # --- JavaScript: package.json (frontend / root) ---
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # --- GitHub Actions: keeps the actions in your workflows current ---
  # Directly relevant to supply-chain: this is what will nudge you to update
  # (and, if you SHA-pin, re-pin) actions/checkout, github/codeql-action, etc.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "github-actions"