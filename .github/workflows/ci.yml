name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      requirements: ${{ steps.filter.outputs.requirements }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'tests/**'
              - 'requirements*.txt'
              - '.flake8'
              - 'pytest.ini'
            frontend:
              - 'frontend/**'
              - 'biome.json'
            requirements:
              - 'requirements.txt'
              - 'scripts/check_resolve.sh'
              - '.github/workflows/ci.yml'

  compat:
    name: Compat Resolve (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.requirements == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.14"]
    steps:
      - uses: actions/checkout@v4

      # A recent host pip is all we need: --python-version makes pip resolve
      # the tree for the *target* interpreter without installing or running it.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Resolve dependencies for Python ${{ matrix.python-version }}
        run: scripts/check_resolve.sh ${{ matrix.python-version }}

  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: needs.detect-changes.outputs.backend == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        if: needs.detect-changes.outputs.backend == 'true'
        run: pip install -r requirements-dev.txt

      - name: Black format check
        if: needs.detect-changes.outputs.backend == 'true'
        run: python -m black --line-length 128 --check backend/ tests/

      - name: Flake8 lint
        if: needs.detect-changes.outputs.backend == 'true'
        run: python -m flake8 backend/ tests/

      - name: Pyright type check
        if: needs.detect-changes.outputs.backend == 'true'
        run: python -m pyright backend/

      - name: Set up Node
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Biome
        if: needs.detect-changes.outputs.frontend == 'true'
        run: npm install -g @biomejs/biome

      - name: Biome format check
        if: needs.detect-changes.outputs.frontend == 'true'
        run: biome format frontend/

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Unit tests
        run: python -m pytest tests/unit/

      - name: Integration tests
        run: python -m pytest tests/integration/
