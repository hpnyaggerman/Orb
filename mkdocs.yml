site_name: Orb
site_description: Agentic RP Frontend — wiki and documentation
site_url: https://orbfrontend.github.io/Orb/
repo_url: https://github.com/OrbFrontend/Orb
repo_name: OrbFrontend/Orb
edit_uri: edit/main/docs/

theme:
  name: material
  # logo: assets/Orb.png
  # favicon: assets/Orb.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture:
      - KV Cache Reuse: architecture/kv-cache.md
      - SSE Turn Stream: architecture/sse-stream.md
      - Secondary Workflows: architecture/secondary-workflow.md
  - Features:
      - Overview: features/index.md
      - Direction:
          - Scene Direction: features/director.md
          - Agentic Lorebook: features/agentic-lorebook.md
          - Feedback Fragments: features/feedback-fragments.md
          - Direction Notes: features/direction-notes.md
      - Editing & Quality:
          - Anti-slop: features/anti-slop.md
          - Anti-repetition: features/anti-repetition.md
          - Length Guard: features/length-guard.md
      - Writing Tools:
          - Super-regenerate: features/super-regenerate.md
          - Magic Rewrite: features/magic-rewrite.md
          - Compress History: features/compress-history.md
      - App & Data:
          - Fetch Cards from Internet: features/fetch-cards.md
          - Backups & Presets: features/backups-presets.md
          - Persona Pinning: features/persona-pinning.md
          - Homepage Stats: features/homepage-stats.md
          - Mobile Compatibility: features/mobile.md
          - Integrated TTS: features/tts.md
  - Contributing: contributing.md
